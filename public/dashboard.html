<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — 10000 Hours</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo">10000 Hours</a>
      <div class="nav-links">
        <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()">DARK</button>
        <span class="auth-only" style="display:none">
          <span id="nav-username" class="nav-user"></span>
          <a href="#" onclick="API.logout()">Log out</a>
        </span>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="dashboard-header">
      <h1>Your tasks</h1>
      <button id="create-btn" class="btn btn-sm">+ New task</button>
    </div>

    <div id="empty-state" class="empty-state">
      <h2>No tasks yet</h2>
      <p>Create your first task and start tracking your 10,000-hour journey.</p>
      <button id="create-empty-btn" class="btn">Create your first task</button>
    </div>

    <div id="task-list"></div>
  </div>

  <div id="create-modal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>New task</h2>
      <form id="create-form">
        <div class="form-group">
          <label for="task-name">Task name</label>
          <input type="text" id="task-name" class="form-input" placeholder="e.g. Learn Piano" required>
        </div>
        <div id="form-error" class="form-error"></div>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-ghost">Cancel</button>
          <button type="submit" class="btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
