<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — 10000 Hours</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box" style="position:relative">
      <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()" style="position:absolute;top:0;right:0">DARK</button>
      <a href="/" class="nav-logo" style="display:block;margin-bottom:24px;">10000 Hours</a>
      <h1 class="auth-title">Begin your journey</h1>
      <p class="auth-subtitle">Create an account to track your 10,000 hours.</p>

      <form id="signup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-input" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required>
        </div>
        <div id="form-error" class="form-error" style="margin-bottom:16px;"></div>
        <button type="submit" class="btn btn-full">Create account</button>
      </form>

      <div class="auth-links">
        Already have an account? <a href="/login.html">Log in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/theme.js"></script>
  <script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('form-error');
      errorEl.textContent = '';

      try {
        await API.signup(
          document.getElementById('username').value,
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
